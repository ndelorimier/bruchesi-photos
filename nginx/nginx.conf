worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 50M;

  # HTTP only — pour passer en HTTPS : exécuter scripts/init-ssl.sh
  server {
    listen 80;
    server_name _;

    # Serve PWA
    root /usr/share/nginx/html;
    index index.html;

    # Assets hachés (nom unique par build) → cache long, immuable
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Service worker + entrée d'app : JAMAIS en cache (sinon les MAJ ne se
    # propagent pas — ni au navigateur, ni à Cloudflare). no-cache force la
    # revalidation à chaque fois.
    location = /sw.js          { add_header Cache-Control "no-cache"; }
    location = /registerSW.js  { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /push-sw.js     { add_header Cache-Control "no-cache"; }

    # API proxy
    location /api/ {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Photos statiques approuvées
    location /photos/ {
      alias /usr/share/nginx/html/photos/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # SPA : tout le reste retombe sur index.html, non mis en cache
    # (pour que le navigateur récupère toujours les derniers assets hachés).
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }
  }
}
