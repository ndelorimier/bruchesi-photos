version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      # "8443:443"  # décommenter après init-ssl.sh + configurer reverse proxy DSM
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # décommenter après init-ssl.sh
      - ./pwa_dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: ./api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - COMPREFACE_URL=${COMPREFACE_URL}
      - COMPREFACE_API_KEY=${COMPREFACE_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
      - APP_URL=${APP_URL}
      - PHOTOS_PATH=/data/photos
    volumes:
      - photos_data:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bruchesiPhotos
      POSTGRES_USER: bruchesi
      POSTGRES_PASSWORD: bruchesi
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bruchesi -d bruchesiPhotos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # CompreFace est géré séparément — voir docker-compose.compreface.yml
  # Démarrer avec : docker-compose -f docker-compose.compreface.yml up -d
  # Après démarrage, copier l'API key dans .env → COMPREFACE_API_KEY

volumes:
  pg_data:
  photos_data:

networks:
  default:
    name: bruchesi-net
